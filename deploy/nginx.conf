# Reverse-proxy HTTPS nginx pour le portail captif.
# 1. Remplacez portal.example.com par votre domaine.
# 2. Générez le certificat : certbot --nginx -d portal.example.com
# 3. Définissez TRUST_PROXY=1 dans le .env du portail.

# Redirige le HTTP vers le HTTPS.
server {
    listen 80;
    server_name portal.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name portal.example.com;

    ssl_certificate     /etc/letsencrypt/live/portal.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal.example.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
