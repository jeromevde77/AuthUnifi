name: Publier les images Docker (GHCR)

# Construit les images sur un runner GitHub (rapide, multi-arch amd64 + arm64) et
# les publie sur ghcr.io, pour les hôtes qui ne peuvent pas / ne veulent pas les
# construire eux-mêmes (NAS Synology à noyau ancien, Raspberry Pi lent…).
#
# Deux images :
#   - authunifi        : le portail (Node + better-sqlite3)
#   - authunifi-caddy  : Caddy + plugin DNS OVH (pour le HTTPS local DNS-01)

on:
  push:
    branches: ["main", "master", "claude/**"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - file: Dockerfile
            image: ghcr.io/jeromevde77/authunifi
          - file: deploy/Caddy.ovh.Dockerfile
            image: ghcr.io/jeromevde77/authunifi-caddy
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ matrix.image }}:latest
