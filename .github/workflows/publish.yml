name: Publier l'image Docker (GHCR)

# Construit l'image sur un runner GitHub (noyau récent) et la publie sur
# ghcr.io, pour les hôtes qui ne peuvent pas la construire eux-mêmes (ex. NAS
# Synology à noyau ancien). Multi-arch amd64 + arm64.

on:
  push:
    branches: ["main", "master", "claude/**"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/jeromevde77/authunifi:latest
