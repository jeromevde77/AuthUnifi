services:
  portal:
    # Image multi-arch (amd64 + arm64) publiée sur GHCR à chaque push sur main.
    # Déploiement : `docker compose pull && docker compose up -d` (pas de build local).
    # Pour construire localement à la place, commentez `image:` et décommentez `build`.
    image: ghcr.io/jeromevde77/authunifi:latest
    # build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      # Conserve la base SQLite des emails entre les redémarrages.
      - portal-data:/app/data

volumes:
  portal-data:
