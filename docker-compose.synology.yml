# Variante Synology : TÉLÉCHARGE une image pré-construite (pas de build local).
#
# Pourquoi : sur les NAS à noyau ancien, le profil seccomp par défaut empêche
# Docker d'exécuter la moindre étape `RUN` pendant un build (erreur
# « OCI runtime create failed »). On ne construit donc pas sur le NAS : l'image
# est construite par GitHub Actions et publiée sur ghcr.io ; ici on la tire.
#
# Différences avec docker-compose.yml :
#  - `image:` (téléchargement) au lieu de `build:` ;
#  - `security_opt: seccomp:unconfined` pour démarrer sur le vieux noyau ;
#  - base SQLite en bind mount ./data (visible/sauvegardable depuis File Station) ;
#  - conteneur en root pour écrire sans souci dans ce dossier monté.
#
# Prérequis : l'image ghcr.io/jeromevde77/authunifi doit être PUBLIQUE
# (GitHub → votre profil → Packages → authunifi → Package settings → Public),
# sinon le NAS ne pourra pas la télécharger sans authentification.
#
# Utilisation : Container Manager → Projet attend un fichier nommé
# "docker-compose.yml" : renommez ce fichier ainsi, ou collez son contenu.
# Pour mettre à jour : Container Manager → image → tirez à nouveau "latest",
# puis reconstruisez/redémarrez le projet.

services:
  portal:
    image: ghcr.io/jeromevde77/authunifi:latest
    restart: unless-stopped
    user: "0:0"
    security_opt:
      - seccomp:unconfined
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
